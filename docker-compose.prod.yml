services:
  pramanaledger-demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astrax-compute-cloud-professional-auth-audit
    restart: unless-stopped
    environment:
      HASH_SECRET: ${HASH_SECRET:-local-demo-secret}
    expose:
      - "8075"
    networks:
      - astrax-compute-cloud_default

networks:
  astrax-compute-cloud_default:
    external: true
